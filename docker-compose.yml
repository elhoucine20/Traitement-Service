version: '3.8'

services:
  traitement_service:
    build:
      context: .
      dockerfile: ./docker/php/dockerfile
    container_name: traitement_service_container
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: pgsql
      DB_HOST: traitement_db
      DB_PORT: 5432
      DB_DATABASE: traitement_db
      DB_USERNAME: traitement
      DB_PASSWORD: traitement
    depends_on:
      - traitement_db
    expose:
      - "9000"

  traitement_nginx:
    image: nginx:alpine
    container_name: traitement_nginx_container
    ports:
      - "8084:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    depends_on:
      - traitement_service

  traitement_db:
    image: postgres:16
    container_name: traitement_db_container
    environment:
      POSTGRES_USER: traitement
      POSTGRES_DB: traitement_db
      POSTGRES_PASSWORD: traitement
    ports:
      - "5433:5432"
    volumes:
      - traitement_db_data:/var/lib/postgresql/data

volumes:
  traitement_db_data:
